<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#ff839b",
              "on-tertiary-fixed": "#400014",
              "secondary": "#bbc8d0",
              "inverse-primary": "#006b5c",
              "tertiary-fixed": "#ffd9de",
              "tertiary": "#ffb2be",
              "tertiary-fixed-dim": "#ffb2be",
              "primary-container": "#00bfa5",
              "outline-variant": "#3c4a46",
              "primary": "#46f1c5",
              "background": "#070e1a",
              "surface-container": "#0c1420",
              "surface-tint": "#46f1c5",
              "primary-fixed": "#68fadd",
              "on-tertiary-fixed-variant": "#900038",
              "error": "#ffb4ab",
              "on-primary": "#00382f",
              "surface-container-highest": "#1c2633",
              "inverse-on-surface": "#f0f1f3",
              "on-secondary-fixed-variant": "#3c494f",
              "on-secondary-container": "#aab7bf",
              "on-surface-variant": "#bacac2",
              "surface-variant": "#1c2633",
              "outline": "#85948f",
              "surface-bright": "#222d3d",
              "inverse-surface": "#e5e1e7",
              "on-secondary": "#263238",
              "on-background": "#e5e1e7",
              "on-secondary-fixed": "#111d23",
              "surface-dim": "#070e1a",
              "error-container": "#93000a",
              "surface-container-lowest": "#040810",
              "primary-fixed-dim": "#46f1c5",
              "on-error-container": "#ffdad6",
              "secondary-fixed-dim": "#bbc8d0",
              "secondary-fixed": "#d7e4ec",
              "surface": "#070e1a",
              "on-primary-fixed": "#00201a",
              "surface-container-low": "#09101d",
              "surface-container-high": "#131c2b",
              "on-tertiary-container": "#800031",
              "secondary-container": "#3c494f",
              "on-primary-fixed-variant": "#005145",
              "on-surface": "#e5e1e7",
              "on-tertiary": "#660025",
              "on-primary-container": "#00473c",
              "on-error": "#690005"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .text-gradient {
            background: linear-gradient(135deg, #46f1c5 0%, #00d4aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .button-glow {
            box-shadow: 0 0 20px rgba(70, 241, 197, 0.3), 0 0 40px rgba(70, 241, 197, 0.1);
        }
        .sheet-glass {
            background: rgba(12, 20, 32, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        body {
            background-color: #070e1a;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface antialiased">
<!-- Top App Bar (Shared Component) -->
<header class="fixed top-0 w-full z-40 bg-[#0c1420]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.3)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest active:scale-95 transition-transform duration-200">
<img class="w-full h-full object-cover" data-alt="close-up portrait of a professional woman with soft lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLVCZ5c6kCqvz-X2vB5BxeKwDTEqpLOCBrWwILpY-uCrfwKssXsP3NKFMujfzBUn6Pw6yPr-YapVpetm2oq-YWjnJIsGLZWlsk7Zk8v5wuADWpxlgO_01fJjCuJ0EpyqFSKE5ZHVJAjp4MURVUuOjiv3Z6Uc48bEMwNwjwVN_GZYkwW2gnt7lUQyQQC4XeGEtxgkUsCuhg0Kmk9JaE9Mj3iDWmDqvDfEfHb4guvzag1Z7yYyDY_GZpgw9k7z0U41x7zJARVu4IAbN-"/>
</div>
<span class="font-manrope text-xl font-extrabold text-white tracking-widest">BudgetMe</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#bacac2] hover:opacity-80 transition-opacity cursor-pointer">notifications</span>
</div>
</header>
<!-- Main Content Underlay -->
<main class="pt-24 px-6 opacity-20 transition-opacity">
<div class="mb-12">
<h1 class="text-4xl font-extrabold tracking-tight mb-2">Dashboard</h1>
<p class="text-on-surface-variant text-sm tracking-wide">March 2024</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 rounded-xl bg-surface-container-low"></div>
<div class="h-32 rounded-xl bg-surface-container-low"></div>
</div>
</main>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/70 backdrop-blur-md z-50"></div>
<!-- Slide-up Operation Modal -->
<div class="fixed bottom-0 left-0 right-0 z-50 transform transition-transform duration-500 ease-out flex flex-col items-center">
<!-- Drag Handle Area -->
<div class="w-12 h-1 bg-white/30 rounded-full mb-3 shadow-sm backdrop-blur-md"></div>
<!-- Modal Content Surface -->
<div class="w-full max-w-2xl sheet-glass rounded-t-[2.5rem] p-8 pb-10 shadow-[0_-20px_80px_-20px_rgba(0,0,0,0.8)] border-t border-white/10">
<!-- Header Section -->
<div class="flex justify-between items-center mb-8">
<h2 class="font-manrope text-[11px] tracking-[0.25em] uppercase font-extrabold text-[#bacac2]">New Operation</h2>
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-on-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined text-lg">close</span>
</div>
</div>
<!-- Numeric Amount Display -->
<div class="text-center mb-10">
<div class="inline-flex items-baseline gap-1">
<span class="text-3xl font-light text-[#46f1c5]/50">$</span>
<span class="text-[5.5rem] font-extrabold tracking-tighter text-white leading-none drop-shadow-[0_0_30px_rgba(255,255,255,0.1)]">0.00</span>
</div>
<div class="mt-5 flex justify-center gap-3">
<span class="px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-[#46f1c5]/20 text-[#46f1c5] border border-[#46f1c5]/20">Expense</span>
<span class="px-4 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-white/5 text-[#bacac2] border border-white/5">Income</span>
</div>
</div>
<!-- Form Container -->
<div class="space-y-4">
<!-- Row 1: Sender & Recipient -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="liquid-glass p-5 rounded-2xl">
<label class="block text-[9px] font-bold tracking-[0.2em] uppercase text-[#46f1c5]/70 mb-2.5">Sender</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#46f1c5]/60" data-weight="fill">account_balance_wallet</span>
<span class="text-white font-semibold">Primary Account</span>
</div>
</div>
<div class="liquid-glass p-5 rounded-2xl">
<label class="block text-[9px] font-bold tracking-[0.2em] uppercase text-[#46f1c5]/70 mb-2.5">Recipient</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#bacac2]/50">person</span>
<span class="text-white/60 font-medium">Merchant or Contact</span>
</div>
</div>
</div>
<!-- Row 2: Subcategory -->
<div class="liquid-glass p-5 rounded-2xl group active:bg-white/[0.05] transition-colors">
<label class="block text-[9px] font-bold tracking-[0.2em] uppercase text-[#46f1c5]/70 mb-2.5">Subcategory</label>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-xl bg-tertiary/10 flex items-center justify-center border border-tertiary/20">
<span class="material-symbols-outlined text-tertiary text-lg">shopping_bag</span>
</div>
<span class="text-white font-semibold">Shopping &amp; Retail</span>
</div>
<span class="material-symbols-outlined text-[#bacac2]/40 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</div>
<!-- Row 3: Comment -->
<div class="liquid-glass p-5 rounded-2xl">
<label class="block text-[9px] font-bold tracking-[0.2em] uppercase text-[#46f1c5]/70 mb-2.5">Comment</label>
<input class="bg-transparent border-none p-0 w-full text-white font-medium placeholder:text-white/20 focus:ring-0" placeholder="Add a note..." type="text"/>
</div>
</div>
<!-- Action Button -->
<div class="mt-10">
<button class="w-full bg-[#46f1c5] py-5 rounded-2xl button-glow hover:brightness-110 active:scale-[0.97] transition-all flex items-center justify-center gap-3 group">
<span class="font-manrope text-[#00382f] font-extrabold tracking-[0.1em] uppercase text-sm">Confirm Operation</span>
<span class="material-symbols-outlined text-[#00382f] group-hover:translate-x-1 transition-transform font-bold">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Background Elements for Atmosphere -->
<div class="fixed top-[-10%] right-[-10%] w-[60%] h-[60%] bg-[#46f1c5]/10 rounded-full blur-[140px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-[50%] h-[50%] bg-[#46f1c5]/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
